<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cocoa | Pure Cocoa Pure Indulgence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        choc: {
                            900: '#0a0604',
                            800: '#1a110d',
                        },
                        gold: {
                            500: '#d4af37',
                        },
                        cream: '#fdfbf7',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Outfit"', 'sans-serif'],
                        cursive: ['"Great Vibes"', 'cursive'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased selection:bg-gold-500 selection:text-choc-900">

    <!-- Navigation -->
    <nav class="absolute w-full top-6 z-50 px-4 md:px-8 transition-all duration-300 flex justify-center" id="navbar">
        <div class="w-full max-w-[1300px] bg-[#0a0604]/60 backdrop-blur-md border border-[#d4af37]/20 rounded-full px-6 lg:px-10 py-4 flex justify-between items-center shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
            
            <a href="#" class="flex items-center space-x-3 text-[18px] md:text-[20px] font-serif tracking-widest text-[#d4af37] font-medium nav-item">
                <svg class="w-6 h-6 md:w-7 md:h-7 text-[#d4af37]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/></svg>
                <span>GOLDEN COCOA</span>
            </a>

            <div class="hidden lg:flex space-x-8 xl:space-x-12 items-center nav-item">
                <a href="#home" class="text-[11px] font-sans tracking-[0.15em] text-[#d4af37] border-b border-[#d4af37] pb-1 uppercase">Home</a>
                <a href="#collections" class="text-[11px] font-sans tracking-[0.15em] text-cream hover:text-gold-500 transition-colors uppercase">Collections</a>
                <a href="#about" class="text-[11px] font-sans tracking-[0.15em] text-cream hover:text-gold-500 transition-colors uppercase">About Us</a>
                <a href="#gift" class="text-[11px] font-sans tracking-[0.15em] text-cream hover:text-gold-500 transition-colors uppercase">Gift Boxes</a>
                <a href="#journal" class="text-[11px] font-sans tracking-[0.15em] text-cream hover:text-gold-500 transition-colors uppercase">Journal</a>
                <a href="#contact" class="text-[11px] font-sans tracking-[0.15em] text-cream hover:text-gold-500 transition-colors uppercase">Contact</a>
            </div>

            <div class="flex items-center space-x-5 md:space-x-6 nav-item">
                <button class="text-[#d4af37] hover:text-cream transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
                <button class="text-[#d4af37] hover:text-cream transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
                <button class="text-[#d4af37] hover:text-cream transition-colors relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="absolute -top-1.5 -right-2 bg-[#d4af37] text-[#0a0604] text-[9px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen w-full flex items-center overflow-hidden" id="hero">
        
        <!-- Video Background Container -->
        <div class="absolute inset-0 w-full h-full -z-10 bg-[#0a0604]">
            
            <!-- Video Background -->
            <video id="heroVideo" autoplay muted playsinline class="w-full h-full object-cover">
                <source src="./assets/Hero.webm" type="video/webm">
            </video>
            
            <!-- Gradient overlays to ensure text readability against any video background -->
            <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/30 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/20"></div>
        </div>
        
        <div class="relative z-10 w-full max-w-[1400px] mx-auto px-6 lg:px-12 pt-32 pb-12 h-full flex items-center justify-start">
            <div class="flex flex-col items-center w-full max-w-[700px]">
                
                <div class="relative flex flex-col items-center max-w-fit">
                    <div class="w-full flex justify-end pr-2 md:pr-6">
                        <p class="font-cursive text-2xl md:text-[2rem] text-[#b88645] mb-2 opacity-0 hero-subtitle">
                            Pure Cocoa Pure Indulgence
                        </p>
                    </div>
    
                    <h1 class="font-serif text-5xl md:text-6xl lg:text-[6.5rem] leading-[1.0] text-[#fbf8f3] font-normal tracking-[0.15em] text-center opacity-0 hero-title">
                        CRAFTED<br>TO MELT
                    </h1>
                </div>
                
                <p class="text-gray-300 font-sans text-xs md:text-sm font-light leading-[1.8] mt-6 mb-10 text-center max-w-[30rem] opacity-0 hero-desc">
                    Experience the richness of the world's finest cocoa,<br>
                    handcrafted into luxurious chocolates that melt effortlessly and<br>
                    leave an unforgettable taste in every bite.
                </p>
                
                <div class="opacity-0 hero-btn">
                    <a href="#explore" class="inline-flex items-center bg-[#8f6336] text-[#fbf8f3] hover:bg-[#a07242] transition-all duration-300 px-8 py-3 shadow-[0_4px_15px_rgba(0,0,0,0.6)] group">
                        <span class="font-sans tracking-[0.15em] text-[11px] md:text-xs uppercase font-medium">Explore Collection</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Scroll Animation Section -->
    <section class="relative h-[100vh] bg-[#0a0604] w-full" id="frame-section">
        <div class="h-screen w-full overflow-hidden">
            <canvas id="frameCanvas" class="absolute inset-0 w-full h-full object-cover"></canvas>
        </div>
    </section>
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

    <script src="main.js"></script>
</body>
</html>
